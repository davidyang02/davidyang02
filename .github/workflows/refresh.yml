name: refresh stats

on:
  schedule:
    - cron: "17 6 * * *"   # daily 06:17 UTC ~ 02:17 EDT
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-stats
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh SVGs
        env:
          # STATS_PAT is a classic PAT with `repo` + `read:user` scopes; if present
          # it lets us count private repos / PRs. Falls back to the default token
          # (public-only visibility).
          GH_TOKEN: ${{ secrets.STATS_PAT || secrets.GITHUB_TOKEN }}
        run: python scripts/refresh.py

      - name: Commit if changed
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No stat changes."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add banner.svg chart.svg equity.svg dashboard.svg
          git commit -m "chore(stats): refresh $(date -u +%Y-%m-%d)"
          git push
